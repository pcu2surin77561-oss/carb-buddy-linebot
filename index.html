<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนนักเรียน - โรงเรียนเบาหวาน</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0f4f3; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding-top: 30px; padding-bottom: 30px; }
        .container { background: white; width: 90%; max-width: 400px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; position: relative; }
        .header { text-align: center; margin-bottom: 20px; }
        .header img { width: 80px; margin-bottom: 10px; }
        .header h2 { color: #00897B; margin: 0; font-size: 22px; }
        .header p { color: #777; font-size: 14px; margin-top: 5px; }
        
        /* แถบแจ้งเตือนเมื่อพบข้อมูลเก่า */
        #updateNotice { display: none; background-color: #e3f2fd; color: #00695c; padding: 10px; border-radius: 8px; font-size: 13px; text-align: center; margin-bottom: 20px; border: 1px solid #b2dfdb; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #444; font-weight: 600; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 15px; box-sizing: border-box; outline: none; transition: 0.3s; font-family: 'Kanit', sans-serif; }
        input:focus, select:focus { border-color: #00897B; box-shadow: 0 0 0 3px rgba(0,137,123,0.1); }
        
        .btn-primary { width: 100%; padding: 15px; background-color: #00897B; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-primary:active { transform: scale(0.98); background-color: #00695C; }
        .btn-primary:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        .btn-secondary { width: 100%; padding: 12px; background-color: #f0f4f3; color: #555; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        
        .footer-text { text-align: center; font-size: 11px; color: #aaa; margin-top: 20px; }
        #loading { display: none; text-align: center; color: #00897B; font-weight: bold; margin-bottom: 15px; font-size: 14px; }
        
        /* สไตล์สำหรับซ่อน/แสดงหน้า */
        .step { display: none; animation: fadeIn 0.4s; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Loading Overlay (เต็มจอ) */
        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85); z-index: 9999; justify-content: center;
            align-items: center; flex-direction: column; font-size: 18px; color: #00897B; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <span style="font-size: 30px; margin-bottom: 10px;">⏳</span>
    กำลังบันทึกข้อมูล...
</div>

<div class="container">
    <div class="header">
        <img src="https://cdn-icons-png.flaticon.com/512/3063/3063176.png" alt="logo">
        <h2>ลงทะเบียนนักเรียน</h2>
        <p id="subtitle">ส่วนที่ 1: ข้อมูลประจำตัว</p>
    </div>

    <div id="loading">⏳ กำลังเชื่อมต่อระบบ...</div>
    <div id="updateNotice">💡 พบข้อมูลเดิมของคุณในระบบ<br>สามารถแก้ไขตัวเลขเพื่ออัปเดตได้เลยครับ</div>

    <div id="step1" class="step active">
        <div class="form-group">
            <label>เลขบัตรประชาชน (13 หลัก)</label>
            <input type="text" id="cid" maxlength="13" pattern="[0-9]{13}" inputmode="numeric" placeholder="ระบุเลขบัตรประชาชน">
        </div>
        <div class="form-group">
            <label>วันเดือนปีเกิด (โปรดใส่ พ.ศ.)</label>
            <input type="text" id="birthday" placeholder="เช่น 01/01/2500" pattern="[0-9]{2}/[0-9]{2}/[0-9]{4}">
        </div>
        <button class="btn-primary" onclick="nextStep()">ถัดไป ➔</button>
    </div>

    <div id="step2" class="step">
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>เพศกำเนิด</label>
                <select id="gender">
                    <option value="">เลือก</option>
                    <option value="ชาย">ชาย</option>
                    <option value="หญิง">หญิง</option>
                </select>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>น.น. (กก.)</label>
                <input type="number" id="weight" placeholder="เช่น 65" inputmode="decimal">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>ส่วนสูง (ซม.)</label>
                <input type="number" id="height" placeholder="เช่น 160" inputmode="numeric">
            </div>
        </div>

        <div class="form-group">
            <label>ระดับกิจกรรมในชีวิตประจำวัน</label>
            <select id="activity">
                <option value="">-- เลือกระดับกิจกรรม --</option>
                <option value="1.2">นั่งเป็นส่วนใหญ่ / ไม่ค่อยได้ออกกำลังกาย</option>
                <option value="1.375">ออกกำลังกายเบาๆ (1-3 วัน/สัปดาห์)</option>
                <option value="1.55">ออกกำลังกายปานกลาง (3-5 วัน/สัปดาห์)</option>
                <option value="1.725">ออกกำลังกายอย่างหนัก (6-7 วัน/สัปดาห์)</option>
                <option value="1.9">ออกกำลังกายเช้า-เย็น / ใช้แรงงานหนัก</option>
            </select>
        </div>

        <div class="form-group">
            <label>เป้าหมายการคุมอาหาร (โควตาคาร์บ)</label>
            <select id="dietType">
                <option value="0.2">Low Carb 20% (ลดน้ำหนัก / คุมเบาหวาน)</option>
                <option value="0.5">Balanced Diet 50% (รักษาสุขภาพทั่วไป)</option>
            </select>
        </div>

        <div class="form-group" style="font-size:13px; background:#f9f9f9; padding:15px; border-radius:10px; border: 1px solid #eee;">
            <label style="display:flex;align-items:flex-start;gap:8px; cursor:pointer; margin:0;">
                <input type="checkbox" id="pdpaConsent" style="width:20px; height:20px; margin-top:2px;">
                <span style="color:#555;">
                    ฉันยินยอมให้ระบบโรงเรียนเบาหวานเก็บและใช้ข้อมูลส่วนบุคคล เพื่อวิเคราะห์สุขภาพและให้คำแนะนำด้านโภชนาการ
                </span>
            </label>
            <div style="font-size:12px;margin-top:6px; text-align:right;">
                อ่านนโยบาย
                <a href="#" target="_blank" style="color:#00897B; text-decoration:underline;">คุ้มครองข้อมูลส่วนบุคคล</a>
            </div>
        </div>
        
        <button class="btn-primary" onclick="submitRegistration()" id="submitBtn">บันทึกข้อมูลและคำนวณคาร์บ</button>
        <button class="btn-secondary" onclick="prevStep()">ย้อนกลับ</button>
    </div>
    
    <p class="footer-text">ข้อมูลของคุณจะได้รับการคุ้มครองตามนโยบายความปลอดภัย</p>
</div>

<script>
    const MY_LIFF_ID = '2009419837-irqrUiU1'; 

    // 1️⃣ & 2️⃣ ย้าย Event Listener เข้าไปใน window.onload เพื่อความปลอดภัย
    window.onload = function () {
        initializeLiff();

        const cidInput = document.getElementById("cid");
        if (cidInput) {
            // ป้องกันการพิมพ์ตัวอักษร
            cidInput.addEventListener("input", function () {
                this.value = this.value.replace(/[^0-9]/g, '').slice(0, 13);
            });
            // ป้องกันการ Paste ตัวอักษร
            cidInput.addEventListener("paste", function(e) {
                setTimeout(() => {
                    this.value = this.value.replace(/[^0-9]/g, '').slice(0, 13);
                }, 10);
            });
        }
    };

    async function initializeLiff() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            
            if (!liff.isInClient()) {
                alert("⚠️ แนะนำให้เปิดระบบนี้ผ่านแอปพลิเคชัน LINE เพื่อการทำงานที่สมบูรณ์ครับ");
            }

            if (!liff.isInClient() && !liff.isLoggedIn()) {
                liff.login();
            }

            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                await fetchExistingData(profile.userId);
            }

        } catch (error) {
            console.error('LIFF Error:', error);
        }
    }

    async function fetchExistingData(userId) {
        // 4️⃣ เพิ่ม Loading ตอนดึงข้อมูลเก่า
        const loading = document.getElementById('loading');
        loading.style.display = 'block';

        try {
            const response = await fetch(`/api/getUser?userId=${userId}`);
            
            if (!response.ok && response.status !== 404) {
                alert("⚠️ ไม่สามารถเชื่อมต่อฐานข้อมูลได้ชั่วคราว กรุณาลองใหม่อีกครั้งครับ");
                return;
            }

            if (response.ok) {
                const data = await response.json();
                if (data && data.cid) {
                    document.getElementById('cid').value = data.cid || '';
                    document.getElementById('birthday').value = data.birthday || '';
                    if(data.gender) document.getElementById('gender').value = data.gender;
                    if(data.weight) document.getElementById('weight').value = data.weight;
                    if(data.height) document.getElementById('height').value = data.height;
                    if(data.activity) document.getElementById('activity').value = data.activity;
                    if(data.dietType) document.getElementById('dietType').value = data.dietType;

                    document.getElementById('updateNotice').style.display = 'block';
                    document.getElementById('submitBtn').innerText = 'อัปเดตข้อมูลและคำนวณคาร์บใหม่';

                    // 5️⃣ UX: ข้าม Step 1 อัตโนมัติถ้ามีข้อมูลเก่า
                    document.getElementById('step1').classList.remove('active');
                    document.getElementById('step2').classList.add('active');
                    document.getElementById('subtitle').innerText = 'แก้ไขข้อมูลสุขภาพ';
                }
            }
        } catch (error) {
            console.error('ไม่สามารถดึงข้อมูลเก่าได้:', error);
        } finally {
            // ปิด Loading
            loading.style.display = 'none';
        }
    }

    function nextStep() {
        const cid = document.getElementById('cid').value.trim();
        const birthday = document.getElementById('birthday').value.trim();

        if (cid.length !== 13) return alert('กรุณากรอกเลขบัตรประชาชนให้ครบ 13 หลักครับ');
        
        const datePattern = /^[0-9]{2}\/[0-9]{2}\/[0-9]{4}$/;
        if (!datePattern.test(birthday)) {
            return alert('กรุณากรอกวันเดือนปีเกิดให้ถูกต้องตามรูปแบบ (เช่น 01/01/2500)');
        }

        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        document.getElementById('subtitle').innerText = 'ส่วนที่ 2: ข้อมูลสุขภาพเบื้องต้น';
    }

    function prevStep() {
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step1').classList.add('active');
        document.getElementById('subtitle').innerText = 'ส่วนที่ 1: ข้อมูลประจำตัว';
    }

    async function submitRegistration() {
        const cid = document.getElementById('cid').value.trim();
        const birthday = document.getElementById('birthday').value.trim();
        const gender = document.getElementById('gender').value;
        const weight = parseFloat(document.getElementById('weight').value);
        const height = parseFloat(document.getElementById('height').value);
        const activityMultiplier = parseFloat(document.getElementById('activity').value);
        const dietMultiplier = parseFloat(document.getElementById('dietType').value);
        const consent = document.getElementById('pdpaConsent').checked;
        const submitBtn = document.getElementById('submitBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');

        if (!gender) return alert('กรุณาเลือกเพศครับ');
        if (!weight || weight <= 0) return alert('กรุณากรอกน้ำหนักให้ถูกต้องครับ');
        if (!height || height <= 0) return alert('กรุณากรอกส่วนสูงให้ถูกต้องครับ');
        if (!activityMultiplier) return alert('กรุณาเลือกระดับกิจกรรมครับ');
        
        if (!consent) {
            return alert('กรุณากดยินยอมการใช้ข้อมูลส่วนบุคคลก่อนบันทึกข้อมูลครับ');
        }

        submitBtn.disabled = true;
        submitBtn.innerText = 'กำลังประมวลผล...';
        loadingOverlay.style.display = 'flex';

        try {
            // 3️⃣ ตรวจสอบก่อน Parse ป้องกัน Error กรณี Match ไม่เจอ
            let birthYearMatch = birthday.match(/\d{4}/);
            if (!birthYearMatch) {
                loadingOverlay.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.innerText = 'บันทึกข้อมูลและคำนวณคาร์บ';
                return alert("รูปแบบวันเกิดไม่ถูกต้อง กรุณาระบุให้ถูกต้อง (เช่น 01/01/2500)");
            }

            let birthYear = parseInt(birthYearMatch[0]);
            if (birthYear > 2400) birthYear -= 543; 
            let age = new Date().getFullYear() - birthYear;

            if (age < 1 || age > 120) {
                loadingOverlay.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.innerText = 'บันทึกข้อมูลและคำนวณคาร์บ';
                return alert('อายุที่คำนวณได้ไม่ถูกต้อง กรุณาตรวจสอบปีเกิดอีกครั้ง');
            }

            let bmr = (gender === 'ชาย') 
                ? 66 + (13.7 * weight) + (5 * height) - (6.8 * age)
                : 665 + (9.6 * weight) + (1.8 * height) - (4.7 * age);

            let tdee = bmr * activityMultiplier;
            let carbCalories = tdee * dietMultiplier;
            let carbGrams = carbCalories / 4;
            let totalCarbExchange = carbGrams / 15;
            let carbPerMeal = Math.round(totalCarbExchange / 3);
            
            if (carbPerMeal < 1) carbPerMeal = 1;

            if (liff.isInClient()) {
                let messagePayload = `ลงทะเบียน ${cid} ${birthday} ${gender} ${weight} ${height} ${activityMultiplier} ${dietMultiplier} ${carbPerMeal}`;
                await liff.sendMessages([{ type: 'text', text: messagePayload }]);
                liff.closeWindow(); 
            } else {
                loadingOverlay.style.display = 'none';
                alert(`(โหมดทดสอบ)\nอายุ: ${age} ปี\nBMR: ${Math.round(bmr)} kcal\n\n📌 ทานได้มื้อละ ${carbPerMeal} คาร์บ`);
                submitBtn.disabled = false;
                submitBtn.innerText = 'อัปเดตข้อมูลและคำนวณคาร์บ';
            }
        } catch (error) {
            loadingOverlay.style.display = 'none';
            alert('เกิดข้อผิดพลาดในการประมวลผล: ' + error.message);
            submitBtn.disabled = false;
            submitBtn.innerText = 'ลองใหม่อีกครั้ง';
        }
    }
</script>

</body>
</html>
