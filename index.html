<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนนักเรียน - โรงเรียนเบาหวาน</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0f4f3; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding-top: 30px; }
        .container { background: white; width: 90%; max-width: 400px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 25px; }
        .header img { width: 80px; margin-bottom: 10px; }
        .header h2 { color: #00897B; margin: 0; font-size: 22px; }
        .header p { color: #777; font-size: 14px; margin-top: 5px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #444; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #00897B; box-shadow: 0 0 0 3px rgba(0,137,123,0.1); }
        
        .btn-submit { width: 100%; padding: 15px; background-color: #00897B; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit:active { transform: scale(0.98); background-color: #00695C; }
        
        .footer-text { text-align: center; font-size: 11px; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://cdn-icons-png.flaticon.com/512/3063/3063176.png" alt="logo">
        <h2>ลงทะเบียนนักเรียน</h2>
        <p>กรุณากรอกข้อมูลเพื่อเชื่อมต่อสมุดพก</p>
    </div>

    <div class="form-group">
        <label>เลขบัตรประชาชน (13 หลัก)</label>
        <input type="number" id="cid" placeholder="ระบุเลขบัตรประชาชน" inputmode="numeric">
    </div>

    <div class="form-group">
        <label>วันเดือนปีเกิด (ค.ศ.)</label>
        <input type="text" id="birthday" placeholder="ตัวอย่าง: 01/01/1980">
    </div>

    <button class="btn-submit" onclick="submitRegistration()">บันทึกข้อมูล</button>
    
    <p class="footer-text">ข้อมูลของคุณจะได้รับการคุ้มครองตามนโยบายความปลอดภัย</p>
</div>

<script>
    // 1. ตั้งค่า LIFF ID (ต้องเอามาจาก LINE Developers Console)
    const MY_LIFF_ID = 'ใส่_LIFF_ID_ของคุณที่นี่'; 

    async function initializeLiff() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            }
        } catch (error) {
            console.error('LIFF Initialization failed', error);
        }
    }

    // เรียกใช้งานเมื่อโหลดหน้าเว็บ
    initializeLiff();

    async function submitRegistration() {
        const cid = document.getElementById('cid').value;
        const birthday = document.getElementById('birthday').value;

        // ตรวจสอบเบื้องต้น
        if (cid.length !== 13) {
            alert('กรุณากรอกเลขบัตรประชาชนให้ครบ 13 หลักครับ');
            return;
        }
        if (!birthday) {
            alert('กรุณากรอกวันเดือนปีเกิดครับ');
            return;
        }

        // 2. ส่งข้อความกลับเข้าไปในแชท (เหมือนนักเรียนพิมพ์เอง)
        try {
            await liff.sendMessages([
                {
                    type: 'text',
                    text: `ลงทะเบียน ${cid} ${birthday}`
                }
            ]);
            // 3. ปิดหน้าต่าง LIFF ทันทีเมื่อส่งเสร็จ
            liff.closeWindow();
        } catch (error) {
            alert('เกิดข้อผิดพลาดในการส่งข้อมูล: ' + error.message);
        }
    }
</script>

</body>
</html>
